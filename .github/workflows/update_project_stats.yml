name: Update project contribution SVG

on:
  workflow_dispatch:
  schedule:
    - cron: "20 5,11,17,23 * * *"
  push:
    paths:
      - "README.md"
      - "scripts/update_project_stats.py"
      - ".github/workflows/update_project_stats.yml"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate contribution SVG
        run: python scripts/update_project_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR_REGEX: "NOP1224|Jiandong Jin|Jin Jiandong|jinjiandong|jiandong"

      - name: Commit updated SVG
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/project_contributions.svg
            git commit -m "Update project contribution SVG"
            git push
          else
            echo "No SVG changes."
          fi