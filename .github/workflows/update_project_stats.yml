name: Update project contribution SVG

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC.
    # Weekly: Sunday 00:20 UTC = Sunday 08:20 China / 09:20 Japan.
    - cron: "20 0 * * 0"
  push:
    paths:
      - "README.md"
      - "scripts/update_project_stats.py"
      - ".github/workflows/update_project_stats.yml"

permissions:
  contents: write

concurrency:
  group: update-project-contribution-svg
  cancel-in-progress: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate contribution SVG
        run: python scripts/update_project_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR_REGEX: "NOP1224|Jiandong Jin|Jin Jiandong|jinjiandong|jiandong"

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/project_contributions.svg

          if git diff --cached --quiet; then
            echo "No SVG changes."
          else
            git commit -m "Update project contribution SVG"
            git push
          fi
