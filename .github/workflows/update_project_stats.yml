name: Update project contribution stats

on:
  workflow_dispatch:
  schedule:
    # Every 6 hours.
    # GitHub cron uses UTC by default.
    # 05:20 / 11:20 / 17:20 / 23:20 UTC
    # = 14:20 / 20:20 / 02:20 / 08:20 JST
    - cron: "20 5,11,17,23 * * *"
  push:
    paths:
      - "README.md"
      - "scripts/update_project_stats.py"
      - ".github/workflows/update_project_stats.yml"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate contribution statistics
        run: python scripts/update_project_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: "NOP1224"
          AUTHOR_REGEX: "NOP1224|Jiandong Jin|Jin Jiandong|jinjiandong|jiandong"
          RECENT_DAYS: "90"

      - name: Commit updated README
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update project contribution stats"
            git push
          else
            echo "No README changes."
          fi